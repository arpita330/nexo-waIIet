<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nexo Admin | Secure Control Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0f172a;min-height:100vh;color:#e2e8f0}

/* LOGIN SCREEN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.25rem;background:radial-gradient(circle at 10% 20%,#0f172a,#020617)}
.login-card{background:#1e293b;border-radius:2rem;padding:2.5rem;width:100%;max-width:360px;border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(4px);box-shadow:0 20px 35px -8px rgba(0,0,0,0.5)}
.login-logo{text-align:center;margin-bottom:2rem}
.login-logo h1{font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;background-clip:text;color:transparent;font-style:italic}
.login-logo p{font-size:.7rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.2em;margin-top:4px}
.pin-input{width:100%;padding:1.25rem;background:#0f172a;border:2px solid rgba(255,255,255,0.08);border-radius:1rem;font-size:2rem;font-weight:900;color:#fff;outline:none;text-align:center;letter-spacing:.5em;font-family:inherit;margin-bottom:1rem;transition:all .2s}
.pin-input:focus{border-color:#3b82f6;background:#1e293b;box-shadow:0 0 0 3px rgba(59,130,246,0.2)}
.pin-input.shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.login-btn{width:100%;padding:1rem;background:#3b82f6;color:#fff;border:none;border-radius:1rem;font-size:.85rem;font-weight:800;text-transform:uppercase;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.login-btn:active{transform:scale(.98)}
.login-err{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3);border-radius:.75rem;padding:.6rem 1rem;font-size:.75rem;font-weight:700;text-align:center;margin-bottom:1rem;display:none}
.login-err.show{display:block}

/* DASHBOARD */
#dashboard{display:none}
.top-bar{background:#1e293b;border-bottom:1px solid rgba(255,255,255,0.06);padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.top-bar h1{font-size:.9rem;font-weight:900;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;background-clip:text;color:transparent;text-transform:uppercase}
.logout-btn{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:.4rem .9rem;border-radius:.75rem;font-size:.7rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.logout-btn:hover{background:rgba(239,68,68,0.3)}
.container{max-width:600px;margin:0 auto;padding:1.25rem}
.tabs{display:flex;background:#1e293b;border-radius:1rem;padding:4px;margin-bottom:1.25rem;border:1px solid rgba(255,255,255,0.06);overflow-x:auto;gap:4px}
.tab{flex-shrink:0;padding:.6rem .9rem;font-weight:700;font-size:.65rem;border-radius:.75rem;cursor:pointer;color:#64748b;text-transform:uppercase;white-space:nowrap;border:none;background:none;font-family:inherit;transition:all .2s}
.tab.active{background:#3b82f6;color:#fff;box-shadow:0 4px 8px rgba(59,130,246,0.2)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.25rem}
.stat-card{background:#1e293b;border-radius:1.25rem;padding:1.25rem;border:1px solid rgba(255,255,255,0.06);transition:all .2s}
.stat-label{font-size:.65rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem}
.stat-val{font-size:1.5rem;font-weight:900;color:#fff}
.stat-sub{font-size:.65rem;color:#64748b;margin-top:2px}
.section-card{background:#1e293b;border-radius:1.5rem;padding:1.25rem;border:1px solid rgba(255,255,255,0.06);margin-bottom:1rem}
.section-title{font-size:.7rem;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem}
.req-item{background:#0f172a;border-radius:1.25rem;padding:1rem;margin-bottom:.75rem;border:1px solid rgba(255,255,255,0.05)}
.req-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem}
.req-info p{font-size:.8rem;font-weight:700;color:#fff;margin-bottom:2px}
.req-info span{font-size:.65rem;color:#64748b;font-weight:600}
.req-amt{font-size:1rem;font-weight:900;color:#10b981;text-align:right}
.req-amt small{display:block;font-size:.6rem;color:#64748b;font-weight:600}
.req-detail{background:#020617;border-radius:.75rem;padding:.6rem .75rem;margin-bottom:.75rem;font-size:.7rem;font-weight:700;color:#94a3b8;word-break:break-all}
.req-detail span{color:#fff}
.req-btns{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.approve-btn{padding:.65rem;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#10b981;border-radius:.75rem;font-size:.7rem;font-weight:800;text-transform:uppercase;cursor:pointer;font-family:inherit;transition:all .2s}
.reject-btn{padding:.65rem;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#ef4444;border-radius:.75rem;font-size:.7rem;font-weight:800;text-transform:uppercase;cursor:pointer;font-family:inherit;transition:all .2s}
.approve-btn:hover,.reject-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.a-input{width:100%;padding:1rem 1.25rem;background:#0f172a;border:2px solid rgba(255,255,255,0.08);border-radius:1rem;font-size:.9rem;font-weight:600;color:#fff;outline:none;font-family:inherit;margin-bottom:.75rem}
.a-input:focus{border-color:#3b82f6}
.a-input::placeholder{color:#64748b}
.a-btn{width:100%;padding:1rem;border:none;border-radius:1rem;font-size:.85rem;font-weight:800;text-transform:uppercase;cursor:pointer;font-family:inherit;color:#fff;margin-bottom:.75rem;transition:all .2s}
.a-btn:active{transform:scale(.98)}
.msg{padding:.75rem 1rem;border-radius:.75rem;font-size:.75rem;font-weight:700;text-align:center;margin-bottom:.75rem;display:none}
.msg.error{background:rgba(239,68,68,0.15);color:#ef4444;display:block;border:1px solid rgba(239,68,68,0.3)}
.msg.success{background:rgba(16,185,129,0.15);color:#10b981;display:block;border:1px solid rgba(16,185,129,0.3)}
.txn-item{background:#0f172a;border-radius:1rem;padding:.9rem 1rem;margin-bottom:.6rem;display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(255,255,255,0.04)}
.txn-left p{font-size:.75rem;font-weight:700;color:#fff;margin-bottom:2px}
.txn-left span{font-size:.62rem;color:#64748b;font-weight:600}
.txn-amt{font-size:.85rem;font-weight:800;color:#10b981}
.badge{font-size:.6rem;font-weight:800;padding:.2rem .5rem;border-radius:.5rem;text-transform:uppercase}
.badge.pending{background:rgba(245,158,11,0.15);color:#f59e0b;border:1px solid rgba(245,158,11,0.3)}
.badge.success{background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.3)}
.badge.failed{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
.user-item{background:#0f172a;border-radius:1rem;padding:.9rem 1rem;margin-bottom:.6rem;border:1px solid rgba(255,255,255,0.04);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.user-name{font-size:.8rem;font-weight:700;color:#fff}
.user-mob{font-size:.65rem;color:#64748b;font-weight:600;margin-top:2px}
.user-bal{font-size:.9rem;font-weight:900;color:#3b82f6}
.empty{text-align:center;padding:2rem;color:#64748b;font-size:.8rem}
.refresh-btn{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);color:#3b82f6;padding:.5rem 1rem;border-radius:.75rem;font-size:.7rem;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:1rem;transition:all .2s}
.refresh-btn:active{transform:scale(.97)}
.tab-section{display:none}
.tab-section.active{display:block}
</style>
</head>
<body>

<!-- LOGIN PANEL -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <h1>NEXO</h1>
      <p>Admin Panel</p>
    </div>
    <div class="login-err" id="login-err">❌ Invalid Access Code</div>
    <input type="password" class="pin-input" id="pin-input" placeholder="••••" maxlength="6" autocomplete="off">
    <button class="login-btn" onclick="doLogin()"><i class="fa-solid fa-lock"></i> Enter Admin</button>
  </div>
</div>

<!-- MAIN DASHBOARD -->
<div id="dashboard">
  <div class="top-bar">
    <h1><i class="fa-solid fa-shield-haltered"></i> NEXO Admin</h1>
    <button class="logout-btn" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
  </div>
  <div class="container">
    <div class="tabs">
      <button class="tab active" data-tab="stats">📊 Stats</button>
      <button class="tab" data-tab="withdraw">💸 Withdraw</button>
      <button class="tab" data-tab="deposit">💳 Deposits</button>
      <button class="tab" data-tab="balance">➕ Balance</button>
      <button class="tab" data-tab="txns">📋 Txns</button>
      <button class="tab" data-tab="users">👥 Users</button>
    </div>

    <!-- STATS SECTION -->
    <div id="tab-stats" class="tab-section active">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-val" id="s-users">—</div><div class="stat-sub">Registered</div></div>
        <div class="stat-card"><div class="stat-label">Transactions</div><div class="stat-val" id="s-txns">—</div><div class="stat-sub">Successful</div></div>
        <div class="stat-card"><div class="stat-label">Total Balance</div><div class="stat-val" id="s-bal" style="color:#10b981;">—</div><div class="stat-sub">All users</div></div>
        <div class="stat-card"><div class="stat-label">API Volume</div><div class="stat-val" id="s-api" style="color:#3b82f6;">—</div><div class="stat-sub">API txns</div></div>
      </div>
      <button class="refresh-btn" onclick="loadStats()"><i class="fa-solid fa-rotate-right"></i> Refresh Stats</button>
    </div>

    <!-- WITHDRAWALS -->
    <div id="tab-withdraw" class="tab-section">
      <button class="refresh-btn" onclick="loadWithdrawals()"><i class="fa-solid fa-rotate-right"></i> Refresh Withdrawals</button>
      <div id="withdraw-list"><div class="empty"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div></div>
    </div>

    <!-- DEPOSITS -->
    <div id="tab-deposit" class="tab-section">
      <button class="refresh-btn" onclick="loadDeposits()"><i class="fa-solid fa-rotate-right"></i> Refresh Deposits</button>
      <div id="deposit-list"><div class="empty"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div></div>
    </div>

    <!-- ADD / DEDUCT BALANCE -->
    <div id="tab-balance" class="tab-section">
      <div class="section-card">
        <div class="section-title"><i class="fa-solid fa-plus-circle"></i> Add Balance (Instant Update)</div>
        <div id="bal-msg" class="msg"></div>
        <input type="text" class="a-input" id="b-mobile" placeholder="Mobile Number (10 digit)">
        <input type="number" class="a-input" id="b-amount" placeholder="Amount (₹)">
        <button class="a-btn" style="background:#10b981" onclick="addBalance()"><i class="fa-solid fa-plus"></i> Add Balance</button>
      </div>
      <div class="section-card">
        <div class="section-title"><i class="fa-solid fa-minus-circle"></i> Deduct Balance</div>
        <div id="ded-msg" class="msg"></div>
        <input type="text" class="a-input" id="d-mobile" placeholder="Mobile Number (10 digit)">
        <input type="number" class="a-input" id="d-amount" placeholder="Amount (₹)">
        <button class="a-btn" style="background:#ef4444" onclick="deductBalance()"><i class="fa-solid fa-minus"></i> Deduct Balance</button>
      </div>
    </div>

    <!-- TRANSACTIONS HISTORY -->
    <div id="tab-txns" class="tab-section">
      <button class="refresh-btn" onclick="loadTxns()"><i class="fa-solid fa-rotate-right"></i> Refresh Transactions</button>
      <div id="txns-list"><div class="empty">Click refresh to load</div></div>
    </div>

    <!-- USERS LIST -->
    <div id="tab-users" class="tab-section">
      <button class="refresh-btn" onclick="loadUsers()"><i class="fa-solid fa-rotate-right"></i> Refresh Users</button>
      <div id="users-list"><div class="empty">Click refresh to load</div></div>
    </div>
  </div>
</div>

<script>
// ======================== CONFIGURATION ========================
const ADMIN_KEY = '2486';
// IMPORTANT: Set your backend API URL (empty = mock mode for demo)
const API = '';   // Example: 'https://your-backend.com/api'

// Helper headers for admin requests
function adminHeaders() {
  return {
    'x-admin-key': ADMIN_KEY,
    'Content-Type': 'application/json'
  };
}

// ======================== AUTO-VERIFY ON INPUT ========================
document.getElementById('pin-input').addEventListener('input', function(e) {
  const value = e.target.value;
  if (value.length === 4) {
    if (value === ADMIN_KEY) {
      doLogin();
    } else {
      const inp = document.getElementById('pin-input');
      inp.classList.add('shake');
      document.getElementById('login-err').classList.add('show');
      setTimeout(() => {
        inp.classList.remove('shake');
        document.getElementById('login-err').classList.remove('show');
        inp.value = '';
      }, 1500);
    }
  }
});

// ======================== AUTH ========================
(function init() {
  const urlKey = new URLSearchParams(window.location.search).get('key');
  const sessionOk = sessionStorage.getItem('admin_ok');
  if (urlKey === ADMIN_KEY || sessionOk === '1') {
    sessionStorage.setItem('admin_ok', '1');
    showDashboard();
  }
})();

function doLogin() {
  const pin = document.getElementById('pin-input').value;
  if (pin === ADMIN_KEY) {
    sessionStorage.setItem('admin_ok', '1');
    document.getElementById('login-err').classList.remove('show');
    showDashboard();
  } else {
    const inp = document.getElementById('pin-input');
    inp.classList.add('shake');
    document.getElementById('login-err').classList.add('show');
    inp.value = '';
    setTimeout(() => {
      inp.classList.remove('shake');
      document.getElementById('login-err').classList.remove('show');
    }, 2000);
  }
}

function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadStats();
  loadWithdrawals();
  loadDeposits();
}

function doLogout() {
  sessionStorage.removeItem('admin_ok');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pin-input').value = '';
}

// ======================== TAB MANAGEMENT ========================
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function() {
    const tabId = this.getAttribute('data-tab');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.tab-section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(`tab-${tabId}`).classList.add('active');
    if (tabId === 'txns') loadTxns();
    if (tabId === 'users') loadUsers();
  });
});

// ======================== API MOCK / REAL HANDLER ========================
async function apiRequest(endpoint, options = {}) {
  const url = API ? `${API}${endpoint}` : endpoint;
  const defaultOptions = {
    headers: adminHeaders(),
    ...options
  };
  try {
    const res = await fetch(url, defaultOptions);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (err) {
    console.warn(`API error ${endpoint}:`, err);
    if (!API) return mockResponse(endpoint, options);
    throw err;
  }
}

function mockResponse(endpoint, options) {
  if (endpoint === '/admin/stats') return { status: 'success', users: 156, transactions: 892, total_balance: 342850, api_volume: 125430 };
  if (endpoint === '/admin/users') return { status: 'success', users: [
    { _id: '1', name: 'Rajesh Kumar', mobile: '9876543210', balance: 12500 },
    { _id: '2', name: 'Priya Sharma', mobile: '9988776655', balance: 3400 },
    { _id: '3', name: 'Amit Verma', mobile: '9123456789', balance: 780 }
  ]};
  if (endpoint === '/admin/transactions') return { status: 'success', transactions: [
    { _id: 'tx1', type: 'deposit', amount: 500, status: 'pending', remark: 'UTR:1234567890', receiver_id: { name: 'Rajesh', mobile: '9876543210' }, tx_time: new Date().toISOString() },
    { _id: 'tx2', type: 'withdraw', amount: 200, status: 'completed', remark: 'UPI:raj@okhdfc', sender_id: { name: 'Priya', mobile: '9988776655' }, tx_time: new Date().toISOString() }
  ]};
  if (endpoint === '/admin/withdrawals') return { status: 'success', withdrawals: [
    { _id: 'wd1', tx_id: 'W123', amount: 1500, remark: 'user@okicici', sender_id: { name: 'Amit Verma', mobile: '9123456789' }, tx_time: new Date().toISOString() }
  ]};
  if (options.method === 'POST' && endpoint === '/admin/add-balance') {
    const body = JSON.parse(options.body);
    return { status: 'success', new_balance: 15000, message: `Added ₹${body.amount}`, tx_id: 'TX_' + Date.now() };
  }
  if (options.method === 'POST' && endpoint === '/admin/deduct-balance') {
    const body = JSON.parse(options.body);
    return { status: 'success', new_balance: 9800, message: `Deducted ₹${body.amount}` };
  }
  if (options.method === 'POST' && endpoint.includes('/admin/approve-withdraw')) return { status: 'success' };
  if (options.method === 'POST' && endpoint.includes('/admin/reject-withdraw')) return { status: 'success' };
  return { status: 'success' };
}

// ======================== STATS ========================
async function loadStats() {
  try {
    const data = await apiRequest('/admin/stats');
    if (data.status === 'success') {
      document.getElementById('s-users').innerText = data.users ?? 0;
      document.getElementById('s-txns').innerText = data.transactions ?? 0;
      document.getElementById('s-bal').innerHTML = '₹' + (data.total_balance || 0).toFixed(2);
      document.getElementById('s-api').innerHTML = '₹' + (data.api_volume || 0).toFixed(2);
    }
  } catch(e) { console.error(e); }
}

// ======================== WITHDRAWALS ========================
async function loadWithdrawals() {
  const container = document.getElementById('withdraw-list');
  container.innerHTML = '<div class="empty"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>';
  try {
    const data = await apiRequest('/admin/withdrawals');
    const withdrawals = data.withdrawals || [];
    if (withdrawals.length === 0) {
      container.innerHTML = '<div class="empty"><i class="fa-solid fa-check-circle" style="color:#10b981"></i><br>No pending withdrawals</div>';
      return;
    }
    let html = '';
    withdrawals.forEach(w => {
      const mobile = w.sender_id?.mobile || '—';
      const name = w.sender_id?.name || 'User';
      const upi = w.remark || '—';
      const amt = parseFloat(w.amount).toFixed(2);
      const time = new Date(w.tx_time).toLocaleString('en-IN');
      html += `<div class="req-item" id="wd-${w._id}">
        <div class="req-top"><div class="req-info"><p>${escapeHtml(name)}</p><span>📱 ${escapeHtml(mobile)}</span></div><div class="req-amt">₹${amt}<small>${time}</small></div></div>
        <div class="req-detail"><i class="fa-solid fa-wallet"></i> UPI: <span>${escapeHtml(upi)}</span></div>
        <div class="req-btns">
          <button class="approve-btn" onclick="approveWithdraw('${w.tx_id}','${w._id}')"><i class="fa-solid fa-check"></i> Approve</button>
          <button class="reject-btn" onclick="rejectWithdraw('${w.tx_id}','${w._id}')"><i class="fa-solid fa-xmark"></i> Reject</button>
        </div>
      </div>`;
    });
    container.innerHTML = html;
  } catch(e) { container.innerHTML = '<div class="empty">Error loading withdrawals</div>'; }
}

async function approveWithdraw(txId, docId) {
  if (!confirm('Approve this withdrawal?')) return;
  try {
    const data = await apiRequest(`/admin/approve-withdraw/${txId}`, { method: 'POST' });
    if (data.status === 'success') {
      document.getElementById(`wd-${docId}`)?.remove();
      alert('✅ Withdrawal approved successfully');
      loadStats();
    } else alert('Error: ' + (data.message || 'Unknown'));
  } catch(e) { alert('Failed to approve'); }
}

async function rejectWithdraw(txId, docId) {
  if (!confirm('Reject and refund user?')) return;
  try {
    const data = await apiRequest(`/admin/reject-withdraw/${txId}`, { method: 'POST' });
    if (data.status === 'success') {
      document.getElementById(`wd-${docId}`)?.remove();
      alert('❌ Withdrawal rejected & refunded');
      loadStats();
    } else alert('Error: ' + (data.message || 'Unknown'));
  } catch(e) { alert('Failed to reject'); }
}

// ======================== DEPOSITS (PENDING UTR) ========================
async function loadDeposits() {
  const container = document.getElementById('deposit-list');
  container.innerHTML = '<div class="empty"><i class="fa-solid fa-spinner fa-spin"></i> Loading deposits...</div>';
  try {
    const data = await apiRequest('/admin/transactions');
    const allTx = data.transactions || [];
    const pendingDeps = allTx.filter(t => t.status === 'pending' && t.remark && t.remark.includes('UTR:'));
    if (pendingDeps.length === 0) {
      container.innerHTML = '<div class="empty"><i class="fa-solid fa-check-circle"></i><br>No pending deposits</div>';
      return;
    }
    let html = '';
    pendingDeps.forEach(dep => {
      const mobile = dep.receiver_id?.mobile || '—';
      const name = dep.receiver_id?.name || 'User';
      const utr = dep.remark.replace('UTR:', '');
      const amt = parseFloat(dep.amount).toFixed(2);
      const time = new Date(dep.tx_time).toLocaleString('en-IN');
      html += `<div class="req-item" id="dep-${dep._id}">
        <div class="req-top"><div class="req-info"><p>${escapeHtml(name)}</p><span>📱 ${escapeHtml(mobile)}</span></div><div class="req-amt">₹${amt}<small>${time}</small></div></div>
        <div class="req-detail"><i class="fa-solid fa-receipt"></i> UTR: <span>${escapeHtml(utr)}</span></div>
        <div class="req-btns">
          <button class="approve-btn" onclick="approveDeposit('${dep._id}','${mobile}','${amt}')"><i class="fa-solid fa-check"></i> Approve</button>
          <button class="reject-btn" onclick="rejectDeposit('${dep._id}')"><i class="fa-solid fa-xmark"></i> Reject</button>
        </div>
      </div>`;
    });
    container.innerHTML = html;
  } catch(e) { container.innerHTML = '<div class="empty">Error loading deposits</div>'; }
}

async function approveDeposit(txId, mobile, amount) {
  if (!confirm(`Approve deposit of ₹${amount} for ${mobile}?`)) return;
  try {
    const data = await apiRequest('/admin/add-balance', { method: 'POST', body: JSON.stringify({ mobile, amount: parseFloat(amount) }) });
    if (data.status === 'success') {
      document.getElementById(`dep-${txId}`)?.remove();
      alert(`✅ ₹${amount} added to ${mobile} successfully! User can see updated balance immediately.`);
      loadStats();
      loadUsers();
    } else alert('Approval failed: ' + (data.message || ''));
  } catch(e) { alert('Server error'); }
}

async function rejectDeposit(txId) {
  if (!confirm('Reject deposit request?')) return;
  document.getElementById(`dep-${txId}`)?.remove();
  alert('Deposit rejected');
}

// ======================== ADD / DEDUCT BALANCE (CRITICAL: Updates user balance instantly) ========================
function showMsg(elementId, text, type) {
  const el = document.getElementById(elementId);
  el.textContent = text;
  el.className = `msg ${type}`;
  setTimeout(() => { el.className = 'msg'; }, 4000);
}

async function addBalance() {
  const mobile = document.getElementById('b-mobile').value.trim();
  const amount = document.getElementById('b-amount').value;
  if (!mobile || !amount || amount <= 0) return showMsg('bal-msg', 'Valid mobile & amount required', 'error');
  
  showMsg('bal-msg', 'Processing...', 'success');
  
  try {
    const data = await apiRequest('/admin/add-balance', { 
      method: 'POST', 
      body: JSON.stringify({ mobile, amount: parseFloat(amount) }) 
    });
    
    if (data.status === 'success') {
      // CRITICAL: This ensures user's balance is updated in database
      // The backend must update the user's wallet balance and create a transaction record
      showMsg('bal-msg', `✅ ₹${amount} added to ${mobile}! Balance updated: ₹${data.new_balance}`, 'success');
      
      // Clear inputs
      document.getElementById('b-mobile').value = '';
      document.getElementById('b-amount').value = '';
      
      // Refresh all relevant data
      loadStats();
      loadUsers();
      loadTxns();
      
      // Additional notification: This balance addition is now reflected in user's account
      // When user logs in and calls /wallet/balance, they will see the new amount
      alert(`✅ Success! ₹${amount} has been credited to ${mobile}.\nUser can now see updated balance in their Nexo app.`);
    } else {
      showMsg('bal-msg', data.message || 'Failed to add balance', 'error');
    }
  } catch(e) { 
    console.error('Add balance error:', e);
    showMsg('bal-msg', 'Server error. Check backend connection.', 'error'); 
  }
}

async function deductBalance() {
  const mobile = document.getElementById('d-mobile').value.trim();
  const amount = document.getElementById('d-amount').value;
  if (!mobile || !amount || amount <= 0) return showMsg('ded-msg', 'Valid mobile & amount required', 'error');
  
  showMsg('ded-msg', 'Processing deduction...', 'success');
  
  try {
    const data = await apiRequest('/admin/deduct-balance', { 
      method: 'POST', 
      body: JSON.stringify({ mobile, amount: parseFloat(amount) }) 
    });
    
    if (data.status === 'success') {
      showMsg('ded-msg', `✅ ₹${amount} deducted from ${mobile}! New balance: ₹${data.new_balance}`, 'success');
      document.getElementById('d-mobile').value = '';
      document.getElementById('d-amount').value = '';
      loadStats();
      loadUsers();
      loadTxns();
      alert(`✅ Deduction successful! ₹${amount} removed from ${mobile}.`);
    } else {
      showMsg('ded-msg', data.message || 'Failed to deduct', 'error');
    }
  } catch(e) { 
    showMsg('ded-msg', 'Server error', 'error'); 
  }
}

// ======================== TRANSACTIONS & USERS ========================
async function loadTxns() {
  const container = document.getElementById('txns-list');
  container.innerHTML = '<div class="empty"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>';
  try {
    const data = await apiRequest('/admin/transactions');
    const txns = data.transactions || [];
    if (txns.length === 0) { container.innerHTML = '<div class="empty">No transactions found</div>'; return; }
    let html = '';
    txns.slice(0, 30).forEach(t => {
      const typeIcon = t.type === 'deposit' ? '↓' : '↑';
      const amountClass = t.type === 'deposit' ? '#10b981' : '#f97316';
      const statusBadge = t.status === 'completed' ? 'success' : (t.status === 'pending' ? 'pending' : 'failed');
      const amount = parseFloat(t.amount).toFixed(2);
      const time = new Date(t.tx_time).toLocaleString('en-IN');
      const userDetail = t.receiver_id?.mobile || t.sender_id?.mobile || 'User';
      html += `<div class="txn-item">
        <div class="txn-left"><p>${typeIcon} ${t.type === 'deposit' ? 'Deposit' : 'Withdraw'}</p><span>${time}<br><small>${userDetail}</small></span></div>
        <div><span class="badge ${statusBadge}">${t.status}</span><div class="txn-amt" style="color:${amountClass}">₹${amount}</div></div>
      </div>`;
    });
    container.innerHTML = html;
  } catch(e) { container.innerHTML = '<div class="empty">Failed to load</div>'; }
}

async function loadUsers() {
  const container = document.getElementById('users-list');
  container.innerHTML = '<div class="empty"><i class="fa-solid fa-spinner fa-spin"></i> Loading users...</div>';
  try {
    const data = await apiRequest('/admin/users');
    const users = data.users || [];
    if (users.length === 0) { container.innerHTML = '<div class="empty">No users found</div>'; return; }
    let html = '';
    users.forEach(u => {
      html += `<div class="user-item">
        <div><div class="user-name">${escapeHtml(u.name || 'User')}</div><div class="user-mob">📱 ${u.mobile}</div></div>
        <div class="user-bal">₹${(u.balance || 0).toFixed(2)}</div>
      </div>`;
    });
    container.innerHTML = html;
  } catch(e) { container.innerHTML = '<div class="empty">Error loading users</div>'; }
}

function escapeHtml(str) { 
  if(!str) return ''; 
  return str.replace(/[&<>]/g, function(m){
    if(m==='&') return '&amp;';
    if(m==='<') return '&lt;';
    if(m==='>') return '&gt;';
    return m;
  }); 
}

// Expose functions globally
window.loadStats = loadStats;
window.loadWithdrawals = loadWithdrawals;
window.loadDeposits = loadDeposits;
window.loadTxns = loadTxns;
window.loadUsers = loadUsers;
window.approveWithdraw = approveWithdraw;
window.rejectWithdraw = rejectWithdraw;
window.approveDeposit = approveDeposit;
window.rejectDeposit = rejectDeposit;
window.addBalance = addBalance;
window.deductBalance = deductBalance;
window.doLogin = doLogin;
window.doLogout = doLogout;
</script>
